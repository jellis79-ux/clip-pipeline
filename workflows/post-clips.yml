name: Auto-post Shawn Ryan Show clips

on:
  schedule:
    # Runs daily at 13:00 UTC — adjust to taste
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate clips/captions but don't post or mark episodes processed)"
        type: boolean
        default: false

permissions:
  contents: write   # needed to commit the updated state file and to create releases

jobs:
  post-clips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y fonts-dejavu-core

      - name: Run clip pipeline
        env:
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
          TARGET_PLATFORMS: ${{ secrets.TARGET_PLATFORMS }}
          SHOW_LINK_BACK: ${{ secrets.SHOW_LINK_BACK }}
          SHOW_TAG: ${{ secrets.SHOW_TAG }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CLIPS_PER_EPISODE: ${{ secrets.CLIPS_PER_EPISODE }}
          MIN_CLIP_DURATION: ${{ secrets.MIN_CLIP_DURATION }}
          MAX_CLIP_DURATION: ${{ secrets.MAX_CLIP_DURATION }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # used by the gh CLI for release uploads
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py

      - name: Commit updated processed-episodes state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/processed_episodes.json
          git diff --cached --quiet || git commit -m "Update processed episodes state [skip ci]"
          git push
